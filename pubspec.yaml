name: crater_app
description: "Crater Invoice - Mobile App"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.10.8

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # HTTP & networking
  http: ^1.6.0

  # Local storage
  shared_preferences: ^2.5.4

  # Navigation
  go_router: ^14.0.0

  # State management
  provider: ^6.1.2

  # Charts
  fl_chart: ^0.69.0

  # Date & number formatting
  intl: ^0.20.2

  # Image caching
  cached_network_image: ^3.4.1

  # Loading skeletons
  shimmer: ^3.0.0

  # Pull-to-refresh
  pull_to_refresh: ^2.0.0

  # Utilities
  collection: ^1.19.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
